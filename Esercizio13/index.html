<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio 13 - Somma Array</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .arrays-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .array-input {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .results {
            margin-top: 25px;
            display: none;
        }
        .results.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        .array-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .array-box h3 {
            margin-bottom: 10px;
            color: #667eea;
            font-size: 16px;
        }
        .array-content {
            font-family: monospace;
            font-size: 18px;
            color: #333;
        }
        .operator {
            text-align: center;
            font-size: 24px;
            color: #666;
            margin: 10px 0;
        }
        .result-box {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border: 2px solid #28a745;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>➕ Somma di Due Array</h1>
        
        <div class="arrays-container">
            <div class="array-input">
                <label for="array1">Array 1 (numeri separati da virgola):</label>
                <input type="text" id="array1" placeholder="Es: 1, 0, 2, 4, 6" value="1, 0, 2, 4, 6">
            </div>
            <div class="array-input">
                <label for="array2">Array 2 (numeri separati da virgola):</label>
                <input type="text" id="array2" placeholder="Es: 0, 4, 5, 8, 7" value="0, 4, 5, 8, 7">
            </div>
        </div>
        
        <button onclick="calcolaSomma()">Calcola Somma</button>
        
        <div class="results" id="results">
            <div class="array-box">
                <h3>Array 1</h3>
                <div class="array-content" id="array1Display"></div>
            </div>
            <div class="operator">+</div>
            <div class="array-box">
                <h3>Array 2</h3>
                <div class="array-content" id="array2Display"></div>
            </div>
            <div class="operator">=</div>
            <div class="array-box result-box">
                <h3>Risultato</h3>
                <div class="array-content" id="resultDisplay"></div>
            </div>
        </div>
    </div>
    
    <script>
        function calcolaSomma() {
            const input1 = document.getElementById('array1').value;
            const input2 = document.getElementById('array2').value;
            
            // Converte le stringhe in array di numeri
            const array1 = input1.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            const array2 = input2.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            
            // Somma gli array
            const risultato = sommaArrays(array1, array2);
            
            // Mostra i risultati
            document.getElementById('array1Display').textContent = '[' + array1.join(', ') + ']';
            document.getElementById('array2Display').textContent = '[' + array2.join(', ') + ']';
            document.getElementById('resultDisplay').textContent = '[' + risultato.join(', ') + ']';
            document.getElementById('results').classList.add('show');
        }
        
        /**
         * Somma gli elementi di due array allo stesso indice
         * @param {Array} array1 - Primo array
         * @param {Array} array2 - Secondo array
         * @returns {Array} - Array risultante dalla somma
         */
        function sommaArrays(array1, array2) {
            const lunghezza = Math.max(array1.length, array2.length);
            const risultato = [];
            
            for (let i = 0; i < lunghezza; i++) {
                const val1 = array1[i] || 0;
                const val2 = array2[i] || 0;
                risultato.push(val1 + val2);
            }
            
            return risultato;
        }
        
        // Esempio
        console.log('Test:', sommaArrays([1, 0, 2, 4, 6], [0, 4, 5, 8, 7]));
    </script>
</body>
</html>
