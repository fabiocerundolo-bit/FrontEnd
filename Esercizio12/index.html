<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio 12 - Rimuovi Duplicati</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .comparison {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }
        .box {
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .box.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        .box-original {
            background: #fff3cd;
            border: 2px solid #ffc107;
        }
        .box-result {
            background: #d4edda;
            border: 2px solid #28a745;
        }
        .box h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .box-content {
            font-family: monospace;
            font-size: 16px;
            word-break: break-all;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Rimuovi Duplicati</h1>
        <div class="input-group">
            <label for="arrayInput">Inserisci elementi separati da virgola:</label>
            <input type="text" id="arrayInput" placeholder="Es: mela, banana, mela, pera, banana, uva" value="mela, banana, mela, pera, banana, uva">
        </div>
        <button onclick="rimuoviDuplicati()">Rimuovi Duplicati</button>
        <div class="comparison">
            <div class="box box-original" id="originalBox">
                <h3>Array Originale</h3>
                <div class="box-content" id="originalContent"></div>
            </div>
            <div class="box box-result" id="resultBox">
                <h3>Senza Duplicati</h3>
                <div class="box-content" id="resultContent"></div>
            </div>
        </div>
    </div>
    <script>
        function rimuoviDuplicati() {
            const input = document.getElementById('arrayInput').value;
            if (!input.trim()) {
                alert('Inserisci almeno un elemento');
                return;
            }
            
            // Converte la stringa in array
            const arrayOriginale = input.split(',').map(item => item.trim()).filter(item => item !== '');
            
            // Rimuove i duplicati
            const arraySenzaDuplicati = rimuoviDuplicatiDaArray(arrayOriginale);
            
            // Mostra i risultati
            document.getElementById('originalContent').textContent = '[' + arrayOriginale.join(', ') + ']';
            document.getElementById('resultContent').textContent = '[' + arraySenzaDuplicati.join(', ') + ']';
            document.getElementById('originalBox').classList.add('show');
            document.getElementById('resultBox').classList.add('show');
        }
        
        /**
         * Rimuove gli elementi duplicati da un array
         * @param {Array} array - L'array da pulire
         * @returns {Array} - L'array senza duplicati
         */
        function rimuoviDuplicatiDaArray(array) {
            const visti = {};
            const risultato = [];
            
            for (let i = 0; i < array.length; i++) {
                const elemento = array[i];
                if (!visti[elemento]) {
                    visti[elemento] = true;
                    risultato.push(elemento);
                }
            }
            
            return risultato;
        }
        
        // Esempio
        console.log('Test:', rimuoviDuplicatiDaArray([1, 2, 2, 3, 4, 4, 5]));
    </script>
</body>
</html>
