<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio 18 - Capitalizza Parole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            min-height: 100px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .comparison {
            margin-top: 25px;
            display: none;
        }
        .comparison.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        .box {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .box:last-child {
            margin-bottom: 0;
        }
        .box-original {
            background: #fff3cd;
            border: 2px solid #ffc107;
        }
        .box-result {
            background: #d4edda;
            border: 2px solid #28a745;
        }
        .box h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
            text-transform: uppercase;
        }
        .box-content {
            font-size: 20px;
            line-height: 1.6;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Capitalizza Parole</h1>
        
        <div class="form-group">
            <label for="frase">Inserisci una frase:</label>
            <textarea id="frase" placeholder="Es: oggi andrò a lezione">oggi andrò a lezione</textarea>
        </div>
        
        <button onclick="capitalizza()">Capitalizza 🪄</button>
        
        <div class="comparison" id="comparison">
            <div class="box box-original">
                <h3>Originale</h3>
                <div class="box-content" id="originale"></div>
            </div>
            <div class="box box-result">
                <h3>Risultato</h3>
                <div class="box-content" id="risultato"></div>
            </div>
        </div>
    </div>
    
    <script>
        function capitalizza() {
            const frase = document.getElementById('frase').value;
            
            if (!frase.trim()) {
                alert('Inserisci una frase');
                return;
            }
            
            const fraseCapitalizzata = capitalizzaParole(frase);
            
            document.getElementById('originale').textContent = frase;
            document.getElementById('risultato').textContent = fraseCapitalizzata;
            document.getElementById('comparison').classList.add('show');
        }
        
        /**
         * Capitalizza l'iniziale di ogni parola in una frase
         * @param {string} frase - La frase da modificare
         * @returns {string} - La frase con le iniziali maiuscole
         */
        function capitalizzaParole(frase) {
            const parole = frase.split(' ');
            const paroleCapitalizzate = [];
            
            for (let i = 0; i < parole.length; i++) {
                const parola = parole[i];
                if (parola.length > 0) {
                    const parolaCapitalizzata = parola.charAt(0).toUpperCase() + parola.slice(1);
                    paroleCapitalizzate.push(parolaCapitalizzata);
                } else {
                    paroleCapitalizzate.push(parola);
                }
            }
            
            return paroleCapitalizzate.join(' ');
        }
        
        // Esempio
        console.log('Test:', capitalizzaParole("oggi andrò a lezione"));
    </script>
</body>
</html>
