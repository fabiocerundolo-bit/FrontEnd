<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conta Occorrenze Lettera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .result-number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .result-text {
            color: #666;
            font-size: 16px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Conta Occorrenze</h1>
        
        <div class="form-group">
            <label for="stringa">Inserisci una frase o parola:</label>
            <input type="text" id="stringa" placeholder="Es: Ciao mondo" required>
        </div>
        
        <div class="form-group">
            <label for="lettera">Lettera da cercare:</label>
            <input type="text" id="lettera" placeholder="Es: o" maxlength="1" required>
        </div>
        
        <button onclick="calcolaOccorrenze()">Conta Occorrenze</button>
        
        <div class="result" id="result">
            <div class="result-number" id="risultatoNumero">0</div>
            <div class="result-text" id="risultatoTesto"></div>
        </div>
    </div>

    <script src="contaLettere.js"></script>
    <script>
        function calcolaOccorrenze() {
            const stringa = document.getElementById('stringa').value;
            const lettera = document.getElementById('lettera').value;
            
            if (!stringa || !lettera) {
                alert('Per favore inserisci sia la frase che la lettera da cercare');
                return;
            }
            
            const occorrenze = contaOccorrenze(stringa, lettera);
            
            document.getElementById('risultatoNumero').textContent = occorrenze;
            document.getElementById('risultatoTesto').textContent = 
                `La lettera "${lettera}" appare ${occorrenze} ${occorrenze === 1 ? 'volta' : 'volte'} nella frase`;
            document.getElementById('result').classList.add('show');
        }

        // Permette di premere Invio per calcolare
        document.getElementById('lettera').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calcolaOccorrenze();
            }
        });
    </script>
</body>
</html>
